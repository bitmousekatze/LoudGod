<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoudGod — The Life Recovery Bible, read aloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #14181f; --panel: #1c222c; --ink: #e8e0cd; --dim: #6b7280;
      --gold: #d4af6a; --gold-soft: #d4af6a55;
      --paper: #f2e9d5; --paper-edge: #e0d3b8; --ptext: #3a2f22; --pdim: #8a7a60;
      --active-bg: #e6d5ae;
    }
    body { background: var(--bg); color: var(--ink); font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; overflow: hidden; }
    button, select, input { font-family: 'Courier New', monospace; }
    .hidden { display: none !important; }

    /* ---- landing ---- */
    #landing { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px; overflow-y: auto; }
    #landing h1 { font-size: clamp(2rem, 8vw, 4.2rem); letter-spacing: 0.12em; color: var(--gold); text-shadow: 0 0 40px var(--gold-soft); font-weight: normal; }
    #landing .sub { color: var(--dim); font-size: 0.95rem; font-style: italic; text-align: center; }
    .controls { display: flex; flex-direction: column; gap: 14px; width: min(340px, 92vw); }
    .crow { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--dim); font-family: 'Courier New', monospace; }
    .crow label { min-width: 52px; }
    .crow input[type=range] { flex: 1; accent-color: var(--gold); cursor: pointer; }
    .crow select { flex: 1; background: var(--panel); color: var(--ink); border: 1px solid var(--gold-soft); padding: 6px; font-size: 0.8rem; cursor: pointer; outline: none; min-width: 0; }
    .crow .val { min-width: 34px; text-align: right; color: var(--gold); }
    .big-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold-soft); padding: 12px 24px; font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
    .big-btn:hover { background: var(--gold-soft); border-color: var(--gold); box-shadow: 0 0 20px var(--gold-soft); }
    .big-btn:active { transform: scale(0.97); }

    /* ---- library ---- */
    #library { position: fixed; inset: 0; background: var(--bg); z-index: 90; overflow-y: auto; padding: 28px 5vw 60px; }
    #library h2 { font-family: 'Courier New', monospace; color: var(--gold); font-size: 1rem; letter-spacing: 0.2em; margin: 26px 0 12px; border-bottom: 1px solid var(--gold-soft); padding-bottom: 6px; }
    #library .topbar { display: flex; justify-content: space-between; align-items: center; }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .book-btn { background: var(--panel); border: 1px solid transparent; color: var(--ink); padding: 10px 12px; text-align: left; cursor: pointer; font-size: 0.8rem; transition: all 0.12s; }
    .book-btn:hover { border-color: var(--gold); color: var(--gold); }
    .book-btn small { color: var(--dim); display: block; font-size: 0.68rem; margin-top: 2px; }
    .ch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 6px; margin-top: 8px; }
    .ch-btn { background: var(--panel); border: 1px solid transparent; color: var(--ink); padding: 10px 0; cursor: pointer; font-size: 0.8rem; transition: all 0.12s; }
    .ch-btn:hover { border-color: var(--gold); color: var(--gold); }
    .small-btn { background: transparent; border: 1px solid var(--gold-soft); color: var(--gold); padding: 6px 14px; font-size: 0.72rem; cursor: pointer; letter-spacing: 0.08em; }
    .small-btn:hover { background: var(--gold-soft); }

    /* ---- top bar ---- */
    #topbar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #10141aee; border-bottom: 1px solid var(--gold-soft); display: flex; align-items: center; gap: 10px; padding: 0 14px; z-index: 50; font-family: 'Courier New', monospace; }
    #topbar .loc { color: var(--gold); font-size: 0.85rem; letter-spacing: 0.08em; cursor: pointer; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #topbar .loc:hover { text-decoration: underline; }

    /* ---- the book ---- */
    #reader { position: fixed; top: 48px; bottom: 74px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; perspective: 2200px; }
    #book {
      position: relative; width: min(680px, 94vw); height: min(100%, 860px);
      background: linear-gradient(105deg, var(--paper-edge) 0%, var(--paper) 3.5%, var(--paper) 96%, var(--paper-edge) 100%);
      border-radius: 4px 10px 10px 4px;
      box-shadow: -6px 0 0 #b8a888, -10px 4px 0 #a59472, -14px 8px 0 #9382628c,
                  0 24px 60px #000c, inset 0 0 60px #c9b88f33;
      transform-style: preserve-3d;
    }
    #book::before { /* spine shading */
      content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
      background: linear-gradient(90deg, #00000022, transparent 5%, transparent 95%, #00000014);
    }
    #page-clip { position: absolute; inset: 0; padding: 44px 48px 54px; overflow: hidden; }
    #pages {
      height: 100%; column-gap: 96px;
      font-size: clamp(1rem, 2.1vw, 1.18rem); line-height: 1.85; color: var(--ptext);
      transition: transform 0.55s cubic-bezier(0.4, 0.05, 0.2, 1);
      text-align: justify; hyphens: auto;
    }
    #chap-title { color: #7a5b2a; font-size: 1.6rem; letter-spacing: 0.05em; margin-bottom: 0.8em; font-variant: small-caps; font-weight: normal; }
    .verse { color: var(--ptext); cursor: pointer; border-radius: 3px; transition: background 0.25s; }
    .verse:hover { background: #00000010; }
    .verse .vn { color: #a58545; font-size: 0.62em; vertical-align: super; margin: 0 3px 0 1px; font-family: 'Courier New', monospace; }
    .verse.active { background: var(--active-bg); box-shadow: 0 0 0 3px var(--active-bg); }
    .verse.active .w-hl { color: #8a5a10; font-weight: bold; }

    /* page-turn shadow sweep */
    #turn-shade { position: absolute; inset: 0; border-radius: inherit; pointer-events: none; opacity: 0; background: linear-gradient(100deg, transparent 30%, #00000038 50%, #ffffff30 54%, transparent 75%); }
    #book.turning-fwd { animation: turnF 0.55s cubic-bezier(0.4, 0.05, 0.2, 1); }
    #book.turning-back { animation: turnB 0.55s cubic-bezier(0.4, 0.05, 0.2, 1); }
    #book.turning-fwd #turn-shade { animation: shadeF 0.55s ease; }
    #book.turning-back #turn-shade { animation: shadeB 0.55s ease; }
    @keyframes turnF { 0% { transform: rotateY(0); } 40% { transform: rotateY(-7deg); } 100% { transform: rotateY(0); } }
    @keyframes turnB { 0% { transform: rotateY(0); } 40% { transform: rotateY(7deg); } 100% { transform: rotateY(0); } }
    @keyframes shadeF { 0% { opacity: 0; background-position-x: 0; } 45% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes shadeB { 0% { opacity: 0; } 45% { opacity: 1; } 100% { opacity: 0; } }

    /* corner click zones + page number */
    .flip-zone { position: absolute; top: 0; bottom: 0; width: 18%; cursor: pointer; z-index: 5; }
    .flip-zone.left { left: 0; border-radius: 4px 0 0 4px; }
    .flip-zone.right { right: 0; border-radius: 0 10px 10px 0; }
    .flip-zone:hover { background: linear-gradient(to right, transparent, #00000008); }
    .flip-zone.left:hover { background: linear-gradient(to left, transparent, #00000008); }
    #page-num { position: absolute; bottom: 18px; left: 0; right: 0; text-align: center; color: var(--pdim); font-size: 0.72rem; font-family: 'Courier New', monospace; letter-spacing: 0.15em; }

    /* ---- HUD ---- */
    #hud { position: fixed; bottom: 0; left: 0; right: 0; height: 74px; padding: 12px 18px; background: #10141a; border-top: 1px solid var(--gold-soft); display: flex; align-items: center; gap: 14px; z-index: 50; font-family: 'Courier New', monospace; }
    #hud button { background: transparent; border: 1px solid var(--gold-soft); color: var(--gold); padding: 8px 16px; font-size: 0.85rem; cursor: pointer; letter-spacing: 0.1em; -webkit-tap-highlight-color: transparent; }
    #hud button:hover { background: var(--gold-soft); }
    #play-btn { min-width: 92px; }
    #hud-speed { accent-color: var(--gold); width: 90px; cursor: pointer; }
    #hud .spd { color: var(--dim); font-size: 0.72rem; }
    #progress { flex: 1; height: 5px; background: var(--panel); border-radius: 3px; cursor: pointer; }
    #progress-bar { height: 100%; background: var(--gold); width: 0%; border-radius: 3px; }
    @media (max-width: 560px) {
      #page-clip { padding: 30px 26px 44px; }
      #hud-speed, #hud .spd { display: none; }
    }
  </style>
</head>
<body>

  <div id="landing">
    <h1>LOUDGOD</h1>
    <p class="sub">The Life Recovery Bible &mdash; read aloud, cover to cover.<br/>Old &amp; New Testament.</p>
    <div class="controls">
      <div class="crow"><label>voice</label><select id="voice-sel"></select></div>
      <div class="crow"><label>speed</label><input type="range" id="speed" min="0.5" max="2" step="0.05" value="1"/><span class="val" id="speed-val">1.0x</span></div>
      <button class="big-btn" id="continue-btn">Continue</button>
      <button class="big-btn" id="start-btn">Choose a Book</button>
      <button class="big-btn" id="genesis-btn">Start at Genesis 1</button>
    </div>
  </div>

  <div id="library" class="hidden">
    <div class="topbar"><h2 style="margin:0;border:none;">CHOOSE A BOOK</h2><button class="small-btn" id="lib-close">back</button></div>
    <div id="book-list"></div>
    <div id="chapters" class="hidden">
      <h2 id="ch-book-name"></h2>
      <div class="ch-grid" id="ch-grid"></div>
    </div>
  </div>

  <div id="topbar" class="hidden">
    <button class="small-btn" id="nav-books">books</button>
    <span class="loc" id="loc"></span>
    <button class="small-btn" id="prev-ch">&#171; ch</button>
    <button class="small-btn" id="next-ch">ch &#187;</button>
  </div>

  <div id="reader" class="hidden">
    <div id="book">
      <div id="page-clip"><div id="pages"></div></div>
      <div id="turn-shade"></div>
      <div class="flip-zone left" id="flip-left" title="previous page"></div>
      <div class="flip-zone right" id="flip-right" title="next page"></div>
      <div id="page-num"></div>
    </div>
  </div>

  <div id="hud" class="hidden">
    <button id="play-btn">PLAY</button>
    <div id="progress"><div id="progress-bar"></div></div>
    <span class="spd" id="hud-speed-val">1.0x</span>
    <input type="range" id="hud-speed" min="0.5" max="2" step="0.05" value="1"/>
  </div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const LS = 'loudgod-v1';
  const state = { manifest: [], bookIdx: 0, ch: 0, verse: 0, playing: false, rate: 1, voiceURI: null,
                  chapterData: null, utter: null, page: 0, pageCount: 1, pageW: 0 };

  const saved = JSON.parse(localStorage.getItem(LS) || 'null');
  if (saved) { state.bookIdx = saved.bookIdx || 0; state.ch = saved.ch || 0; state.verse = saved.verse || 0; state.rate = saved.rate || 1; state.voiceURI = saved.voiceURI || null; }

  function save() {
    localStorage.setItem(LS, JSON.stringify({ bookIdx: state.bookIdx, ch: state.ch, verse: state.verse, rate: state.rate, voiceURI: state.voiceURI }));
  }

  // ---------- voices ----------
  function loadVoices() {
    const vs = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const sel = $('voice-sel');
    sel.innerHTML = '';
    vs.forEach(v => {
      const o = document.createElement('option');
      o.value = v.voiceURI; o.textContent = v.name.replace(/Microsoft |Google /,'') + (v.localService ? '' : ' ☁');
      if (v.voiceURI === state.voiceURI) o.selected = true;
      sel.appendChild(o);
    });
    if (!state.voiceURI && vs.length) state.voiceURI = vs[0].voiceURI;
  }
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  $('voice-sel').onchange = e => { state.voiceURI = e.target.value; save(); if (state.playing) { stopSpeech(); speak(); } };

  // ---------- speed ----------
  function setRate(r) {
    state.rate = +r;
    $('speed').value = r; $('hud-speed').value = r;
    $('speed-val').textContent = $('hud-speed-val').textContent = (+r).toFixed(2).replace(/0$/,'') + 'x';
    save();
  }
  $('speed').oninput = e => setRate(e.target.value);
  $('hud-speed').oninput = e => { setRate(e.target.value); if (state.playing) { stopSpeech(); speak(); } };
  setRate(state.rate);

  // ---------- data ----------
  async function loadManifest() {
    state.manifest = await (await fetch('data/manifest.json')).json();
    buildLibrary();
  }
  async function loadChapterData(bookIdx) {
    const b = state.manifest[bookIdx];
    if (!b._data) b._data = await (await fetch('data/' + b.id + '.json')).json();
    return b._data;
  }

  // ---------- library ----------
  function buildLibrary() {
    const wrap = $('book-list'); wrap.innerHTML = '';
    for (const t of ['OT', 'NT']) {
      const h = document.createElement('h2');
      h.textContent = t === 'OT' ? 'OLD TESTAMENT' : 'NEW TESTAMENT';
      wrap.appendChild(h);
      const grid = document.createElement('div'); grid.className = 'book-grid';
      state.manifest.forEach((b, i) => {
        if (b.testament !== t) return;
        const btn = document.createElement('button');
        btn.className = 'book-btn';
        btn.innerHTML = b.name + '<small>' + b.chapters + ' chapter' + (b.chapters > 1 ? 's' : '') + '</small>';
        btn.onclick = () => showChapters(i);
        grid.appendChild(btn);
      });
      wrap.appendChild(grid);
    }
  }
  function showChapters(bookIdx) {
    const b = state.manifest[bookIdx];
    $('chapters').classList.remove('hidden');
    $('ch-book-name').textContent = b.name.toUpperCase();
    const g = $('ch-grid'); g.innerHTML = '';
    for (let c = 0; c < b.chapters; c++) {
      const btn = document.createElement('button');
      btn.className = 'ch-btn'; btn.textContent = c + 1;
      btn.onclick = () => { openChapter(bookIdx, c, 0); };
      g.appendChild(btn);
    }
    $('chapters').scrollIntoView({ behavior: 'smooth' });
  }

  // ---------- reader / pagination ----------
  async function openChapter(bookIdx, ch, verse, autoplay) {
    stopSpeech();
    state.bookIdx = bookIdx; state.ch = ch; state.verse = verse || 0;
    const data = await loadChapterData(bookIdx);
    state.chapterData = data[ch] || [];
    const b = state.manifest[bookIdx];
    const title = (b.name === 'Psalms' ? 'Psalm' : b.name) + ' ' + (ch + 1);
    $('loc').textContent = title;
    document.title = 'LoudGod — ' + title;
    const pages = $('pages'); pages.innerHTML = '';
    const h = document.createElement('h1'); h.id = 'chap-title'; h.textContent = title;
    pages.appendChild(h);
    state.chapterData.forEach((v, i) => {
      const s = document.createElement('span');
      s.className = 'verse'; s.id = 'v' + i;
      s.innerHTML = '<span class="vn">' + v.v + '</span><span class="vt"></span> ';
      s.querySelector('.vt').textContent = v.t;
      s.onclick = () => { state.verse = i; save(); if (state.playing) { stopSpeech(); speak(); } else paint(true); };
      pages.appendChild(s);
      pages.append(' ');
    });
    show('reader');
    layoutPages();
    save(); paint(true);
    if (autoplay) play();
  }

  function layoutPages() {
    const clip = $('page-clip'), pages = $('pages');
    state.pageW = clip.clientWidth - 96; // padding is on clip; column width = clip inner width
    // column-width drives pagination: each column = one page
    const inner = clip.clientWidth - parseFloat(getComputedStyle(clip).paddingLeft) - parseFloat(getComputedStyle(clip).paddingRight);
    state.pageW = inner;
    pages.style.columnWidth = inner + 'px';
    pages.style.width = inner + 'px';
    // measure total pages from full scroll width
    state.pageCount = Math.max(1, Math.round((pages.scrollWidth + 96) / (inner + 96)));
    state.page = Math.min(state.page, state.pageCount - 1);
  }

  function pageOfVerse(i) {
    const el = $('v' + i);
    if (!el) return 0;
    return Math.max(0, Math.round(el.offsetLeft / (state.pageW + 96)));
  }

  function gotoPage(p, dir) {
    p = Math.max(0, Math.min(state.pageCount - 1, p));
    const changed = p !== state.page;
    state.page = p;
    $('pages').style.transform = 'translateX(' + (-p * (state.pageW + 96)) + 'px)';
    $('page-num').textContent = (p + 1) + ' / ' + state.pageCount;
    if (changed && dir) {
      const book = $('book');
      book.classList.remove('turning-fwd', 'turning-back');
      void book.offsetWidth; // restart animation
      book.classList.add(dir > 0 ? 'turning-fwd' : 'turning-back');
    }
  }

  function paint(jump) {
    state.chapterData.forEach((_, i) => {
      const el = $('v' + i); if (!el) return;
      el.classList.toggle('active', i === state.verse);
    });
    const vp = pageOfVerse(state.verse);
    if (jump || vp !== state.page) gotoPage(vp, vp > state.page ? 1 : -1);
    else gotoPage(state.page);
    $('progress-bar').style.width = (state.chapterData.length ? (state.verse / state.chapterData.length * 100) : 0) + '%';
  }

  // manual page flips: turning past the last page rolls into the next chapter
  function flip(dir) {
    const target = state.page + dir;
    if (target >= state.pageCount) { nextChapter(state.playing); return; }
    if (target < 0) { prevChapter(); return; }
    gotoPage(target, dir);
  }
  $('flip-right').onclick = () => flip(1);
  $('flip-left').onclick = () => flip(-1);

  window.addEventListener('resize', () => {
    if ($('reader').classList.contains('hidden')) return;
    layoutPages(); paint(true);
  });

  function show(view) {
    ['landing', 'library', 'reader'].forEach(v => $(v).classList.add('hidden'));
    $(view).classList.remove('hidden');
    const inReader = view === 'reader';
    $('topbar').classList.toggle('hidden', !inReader);
    $('hud').classList.toggle('hidden', !inReader);
    if (view === 'library') $('chapters').classList.add('hidden');
  }

  // ---------- speech ----------
  function stopSpeech() { state.utter = null; speechSynthesis.cancel(); }

  function speak() {
    const v = state.chapterData[state.verse];
    if (!v) { nextChapter(true); return; }
    paint();
    const u = new SpeechSynthesisUtterance(v.t);
    const voice = speechSynthesis.getVoices().find(x => x.voiceURI === state.voiceURI);
    if (voice) u.voice = voice;
    u.rate = state.rate;
    state.utter = u;
    const el = $('v' + state.verse), vt = el && el.querySelector('.vt'), text = v.t;
    u.onboundary = e => {
      if (e.name !== 'word' || !vt) return;
      const start = e.charIndex;
      let end = text.indexOf(' ', start); if (end < 0) end = text.length;
      vt.innerHTML = '';
      vt.append(text.slice(0, start));
      const w = document.createElement('span'); w.className = 'w-hl'; w.textContent = text.slice(start, end);
      vt.appendChild(w);
      vt.append(text.slice(end));
      // auto page-turn when the spoken word crosses onto the next page
      const wp = Math.max(0, Math.round(w.offsetLeft / (state.pageW + 96)));
      if (wp !== state.page) gotoPage(wp, wp > state.page ? 1 : -1);
    };
    u.onend = () => {
      if (state.utter !== u) return; // cancelled
      if (vt) vt.textContent = text;
      state.verse++;
      save();
      if (state.verse >= state.chapterData.length) nextChapter(true);
      else speak();
    };
    speechSynthesis.speak(u);
  }

  function play() { if (state.playing) return; state.playing = true; $('play-btn').textContent = 'PAUSE'; speak(); }
  function pause() { state.playing = false; $('play-btn').textContent = 'PLAY'; stopSpeech(); paint(); }
  $('play-btn').onclick = () => state.playing ? pause() : play();

  async function nextChapter(autoplay) {
    stopSpeech();
    let { bookIdx, ch } = state;
    const b = state.manifest[bookIdx];
    if (ch + 1 < b.chapters) ch++;
    else if (bookIdx + 1 < state.manifest.length) { bookIdx++; ch = 0; }
    else { pause(); return; } // Revelation 22 — the end
    const keepPlaying = autoplay && state.playing;
    state.playing = false;
    await openChapter(bookIdx, ch, 0, keepPlaying);
  }
  async function prevChapter() {
    stopSpeech();
    let { bookIdx, ch } = state;
    if (ch > 0) ch--;
    else if (bookIdx > 0) { bookIdx--; ch = state.manifest[bookIdx].chapters - 1; }
    else return;
    const keepPlaying = state.playing;
    state.playing = false;
    await openChapter(bookIdx, ch, 0, keepPlaying);
  }
  $('next-ch').onclick = () => nextChapter(state.playing);
  $('prev-ch').onclick = () => prevChapter();

  $('progress').onclick = e => {
    const frac = (e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth;
    state.verse = Math.max(0, Math.min(state.chapterData.length - 1, Math.floor(frac * state.chapterData.length)));
    if (state.playing) { stopSpeech(); speak(); } else paint(true);
    save();
  };

  // keyboard: space = play/pause, arrows = pages
  document.addEventListener('keydown', e => {
    if ($('reader').classList.contains('hidden')) return;
    if (e.code === 'Space') { e.preventDefault(); $('play-btn').click(); }
    if (e.code === 'ArrowRight') flip(1);
    if (e.code === 'ArrowLeft') flip(-1);
  });

  // ---------- nav wiring ----------
  $('start-btn').onclick = () => show('library');
  $('genesis-btn').onclick = () => openChapter(0, 0, 0, true);
  $('continue-btn').onclick = () => openChapter(state.bookIdx, state.ch, state.verse, true);
  $('lib-close').onclick = () => show($('pages').children.length ? 'reader' : 'landing');
  $('nav-books').onclick = () => { pause(); show('library'); };
  $('loc').onclick = () => { pause(); show('library'); showChapters(state.bookIdx); };

  if (!saved) $('continue-btn').classList.add('hidden');

  loadManifest().then(() => {
    // deep link: #BookId.Chapter (e.g. #John.3) opens straight to the page
    const m = location.hash.match(/^#(\w+)\.(\d+)$/);
    if (m) {
      const bi = state.manifest.findIndex(b => b.id.toLowerCase() === m[1].toLowerCase());
      if (bi >= 0) openChapter(bi, Math.min(+m[2], state.manifest[bi].chapters) - 1, 0);
    }
  });
})();
</script>
</body>
</html>
